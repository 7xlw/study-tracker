<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Tracker</title>
<style>
:root {
  --bg: #0d1227;
  --panel: #f8fbff;
  --text: #111827;
  --muted: #64748b;
  --primary: #4f46e5;
  --primary2: #22c55e;
  --danger: #ef4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: radial-gradient(circle at 20% 10%, #4f46e5 0%, #0f172a 45%, #0b1223 100%);
  font-family: "Cairo", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  color: #fff;
  padding: 16px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}
.top { text-align: center; }
.page {
  width: min(760px, 100%);
  margin-top: 10px;
  background: var(--panel);
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 24px 70px rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,.15);
  animation: floatCard .6s ease;
}
.top {
  background: linear-gradient(135deg, #3b82f6, #6366f1);
  color: #fff;
  padding: 20px 22px;
  border-radius: 18px 18px 0 0;
}
.top h1 { font-size: clamp(1.7rem, 5vw, 2rem); margin-bottom: 6px; letter-spacing: 0.4px; }
.top p { color: #e2e8f0; font-size: .95rem; line-height:1.4; }
.container { padding: 18px 20px 20px; }
.input-row { display: grid; gap: 10px; grid-template-columns: 1fr 1fr; margin-bottom: 14px; }
@media (max-width: 710px) { .input-row { grid-template-columns: 1fr; }}
.input-row label { font-size: .84rem; color: #334155; display: block; font-weight: 600; margin-bottom: 3px; }
.input-row input, .input-row select, .input-row button {
  width: 100%; border-radius: 10px; border: 1px solid #cbd5e1; padding: 10px 12px;
  font-size: .95rem;
}
.input-row input, .input-row select { background: #fff; color: #0f172a; }
.input-row button {
  border: none; background: linear-gradient(135deg,#4f46e5,#22c55e);
  color: #fff; font-weight: 700; cursor: pointer;
  transition: transform .16s ease, filter .16s ease;
  height: 42px;
}
.input-row button:hover { transform: translateY(-2px); filter: brightness(1.05); }
.error-box {
  margin: 0 0 12px;
  border: 1px solid #f87171;
  background: #fef2f2;
  color: #b91c1c;
  border-radius: 10px;
  padding: 10px 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  font-size: .92rem;
}
.error-box button {
  background: #f87171;
  color: #fff;
  border: none;
  border-radius: 6px;
  width: 30px;
  height: 30px;
  cursor: pointer;
}
.hidden { display: none; }
.small-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 4px; }
.task-row { margin-top: 8px; }
.tasks { display: grid; gap: 10px; margin-top: 6px; }
.task {
  background: #fff; color: #111827; border-radius: 10px; padding: 12px;
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
  border-left: 4px solid transparent; box-shadow: 0 8px 20px rgba(15,23,42,.08);
  animation: fadeIn .25s ease;
}
.task .text { font-weight: 700; font-size: .96rem; }
.task .text.done { text-decoration: line-through; color: #10b981; }
.task button { border: none; border-radius: 8px; width: 38px; height: 38px; background: #4f46e5; color: #fff; cursor: pointer; font-weight: 700; }
.task-actions { display: flex; gap: 6px; }
.task .delete-btn { background: #ef4444 !important; }
.task-grid { background: #eef2ff; border: 1px solid #c7d2fe; border-radius: 10px; padding: 10px; }
.task-grid h3 { margin-bottom: 6px; font-size: 1rem; }
.task-grid ul { list-style: none; padding-left: 0; margin: 0; }
.task-grid li { background: #fff; border-radius: 8px; margin-bottom: 6px; padding: 8px; display:flex; justify-content: space-between; align-items: center; border: 1px solid #dbeafe; }
.task-grid li.done { background: #ecfdf3; border-color: #bbf7d0; }
.task-grid li .task-time { font-size:.8rem; color:#475569; margin-left:4px; }
.footer { padding: 12px 18px; text-align: center; font-size: .9rem; color: #64748b; border-top:1px solid #e2e8f0; }
@keyframes floatCard {
  from { transform: translateY(10px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
@keyframes fadeIn { from { opacity:0; transform: translateY(6px);} to {opacity:1; transform:translateY(0);} }
@keyframes pulseTime { 0% { transform: scale(0.98); opacity: 0.9; } 50% { transform: scale(1.03); opacity: 1; } 100% { transform: scale(0.98); opacity: 0.9; }}

.clock {
  margin: 6px auto 10px;
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: 0.3px;
  color: #fef3c7;
  background: rgba(30, 41, 59, 0.35);
  border: 1px dashed rgba(255,255,255,0.35);
  border-radius: 8px;
  padding: 7px 12px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  animation: pulseTime 2s ease-in-out infinite;
}

.subtitle { margin-top: 8px; color: #e2e8f0; font-size: .97rem; font-weight: 500; }

.top {
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #111827 100%);
  color: #f8fafc;
  padding: 22px 22px;
  border-radius: 18px 18px 0 0;
  text-align: center;
}

body { background: radial-gradient(circle at 20% 10%, #0e172f 0%, #111827 45%, #0b1223 100%); }

.page { border: 1px solid rgba(255,255,255,0.15); }

input, select { border-color: #cbd5e1; }

.task { background: #f8fafc; }
.task.done { background: #ecfdf3; border-left-color: #10b981; }
.task.late {
  background: #fff1f2;
  color: #b91c1c;
  border-left-color: #ef4444;
  border: 1px solid #fecaca;
  box-shadow: 0 8px 20px rgba(220,38,38,.15);
}
.task.late .text { color: #b91c1c; }
.task button { background: #2563eb; }
.task .delete-btn { background: #dc2626 !important; }

.error-box { background: #fff1f2; border-color: #fecdd3; color: #991b1b; }
.error-box button { background: #dc2626; }

.footer { background: #f8fafc; color: #334155; }
</style>
</head>
<body>

<div class="page">
  <section class="top">
    <h1>Study Planner</h1>
    <p id="clock" class="clock">🕒 <span id="clockText">--:--:--</span></p>
    <p class="subtitle">Organize your study tasks clearly with time and priority.</p>
  </section>

  <div class="container">
    <div class="input-row">
      <label>
        مهمة
        <input id="taskInput" type="text" placeholder="مثلاً: مراجعة الرياضيات">
      </label>
      <label>
        وقت المهمة
        <div class="small-row">
          <input id="hourInput" type="number" min="0" max="23" step="1" value="8" placeholder="ساعة">
          <input id="minuteInput" type="number" min="0" max="59" step="1" value="00" placeholder="دقيقة">
        </div>
      </label>
      <label>
        اختر اليوم
        <select id="dayInput" style="width:100%;">
          <option value="الأحد">الأحد</option>
          <option value="الاثنين">الاثنين</option>
          <option value="الثلاثاء">الثلاثاء</option>
          <option value="الأربعاء">الأربعاء</option>
          <option value="الخميس">الخميس</option>
          <option value="الجمعة">الجمعة</option>
          <option value="السبت">السبت</option>
        </select>
      </label>
    </div>
    <div class="input-row">
      <button onclick="addTask()">+ إضافة المهمة</button>
      <button id="toggleTableBtn" style="background:#f59e0b;" onclick="toggleDayTasks()">▼ جدول اليوم</button>
    </div>
    <div class="input-row" style="grid-template-columns:1fr;">
      <div style="background:#eef2ff; border:1px dashed #93c5fd; border-radius:10px; padding:10px; color:#1d4ed8; font-weight:700;">
        اسحب المهمة من القائمة وأفلتها هنا لإضافتها للجدول
      </div>
    </div>
    <div id="errorBox" class="error-box hidden">
      <span>يرجى كتابة المهمة أولاً.</span>
      <button onclick="hideError()">✕</button>
    </div>
    <div class="task-row">
      <div id="tasks" class="tasks"></div>
    </div>
    <div class="task-row">
      <div id="dayTasks" class="tasks hidden" ondrop="dropToTable(event)" ondragover="allowDrop(event)"></div>
    </div>
  </div>
  <div class="footer">التصميم أصبح احترافي مع أنيميشن والتوقيت القابل للضبط.</div>
</div>

<script>
const hourEl = document.getElementById("hourInput");
const minuteEl = document.getElementById("minuteInput");
let tasks = JSON.parse(localStorage.getItem("studyTasks") || "[]");

function saveTasks(){ localStorage.setItem("studyTasks", JSON.stringify(tasks)); }
function to24(hour, minute){
  const h = Number(hour);
  const m = Number(minute);
  if (Number.isNaN(h) || Number.isNaN(m)) return null;
  if (h < 0 || h > 23 || m < 0 || m > 59) return null;
  return `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
}

function showError(){ document.getElementById("errorBox").classList.remove("hidden"); }
function hideError(){ document.getElementById("errorBox").classList.add("hidden"); }

function showToast(message){ alert(message); }
function hideToast(){ }

function addTask(){
  const text = document.getElementById("taskInput").value.trim();
  const hour = Number(document.getElementById("hourInput").value);
  const minute = Number(document.getElementById("minuteInput").value);
  const day = document.getElementById("dayInput").value;

  if (!text){ showError(); return; }
  const time24 = to24(hour, minute);
  if (!time24){ alert("أدخل وقتًا صحيحًا (0-23 ساعة، 0-59 دقيقة)"); return; }

  hideError();
  tasks.unshift({
    text,
    time: time24,
    day: day || "الأحد",
    display: `${String(hour).padStart(2, "0")}:${String(minute).padStart(2, "0")}`,
    done: false,
    inTable: false,
  });
  saveTasks();
  renderTasks();
  updateTaskPicker();
  document.getElementById("taskInput").value = "";
}

function markDone(i){ tasks[i].done = !tasks[i].done; saveTasks(); renderTasks(); updateTaskPicker(); }
function deleteTask(i){ tasks.splice(i,1); saveTasks(); renderTasks(); updateTaskPicker(); }

function toggleInTable(i){
  tasks.forEach((t, j) => t.inTable = (j === i ? !tasks[i].inTable : false));
  saveTasks();
  renderTasks();
  updateTaskPicker();
}
function addTaskToTable(){
  const picker = document.getElementById("taskPicker");
  const idx = Number(picker.value);
  if (Number.isNaN(idx) || idx < 0 || idx >= tasks.length){ alert("اختر مهمة من القائمة أولًا."); return; }
  tasks.forEach((task, i) => task.inTable = (i === idx));
  saveTasks();
  renderTasks();
  updateTaskPicker();
  showDayTasks();
}
function removeFromTable(idx){
  if (tasks[idx]){
    tasks[idx].inTable = false;
    saveTasks();
    renderTasks();
    updateTaskPicker();
    showDayTasks();
  }
}

function updateTaskPicker(){
  const picker = document.getElementById("taskPicker");
  if (!picker) return;
  picker.innerHTML = "";
  if (!tasks.length){
    const option = document.createElement("option");
    option.value = "";
    option.textContent = "لا توجد مهام";
    picker.appendChild(option);
    return;
  }
  tasks.forEach((task, i) => {
    const option = document.createElement("option");
    option.value = i;
    option.textContent = `${task.text} (${task.day} ${task.display})`;
    picker.appendChild(option);
  });
}


function updateClock(){
  const now = new Date();
  document.getElementById("clockText").textContent = now.toLocaleTimeString("en-US", {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}

function showDayTasks(){
  const day = document.getElementById("dayInput").value;
  const listEl = document.getElementById("dayTasks");
  listEl.classList.remove("hidden");
  listEl.innerHTML = "";
  const dayTasks = tasks.filter((task) => task.day === day && task.inTable);
  const box = document.createElement("div");
  box.className = "task";
  if (!dayTasks.length){
    box.innerHTML = `<div class="text">جدول ${day}</div><div style='font-size:.8rem; color:#475569; margin-top:4px;'>لا يوجد مهام لهذا اليوم</div>`;
    listEl.appendChild(box);
    const btn = document.getElementById("toggleTableBtn");
    if (btn) btn.textContent = "▼ إخفاء الجدول";
    return;
  }

  const items = dayTasks.map((task) => {
    const index = tasks.findIndex(t => t === task);
    return `<div style='margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; gap:6px; background:#f8fafc; padding:6px; border-radius:8px;'><span><strong>${task.text}</strong> <span style='color:#475569;'>(${task.display})</span></span><span style='display:flex; gap:4px;'><button style='background:#10b981;color:white;border:none;border-radius:6px;padding:4px 8px;cursor:pointer;' onclick='markDone(${index})'>${task.done ? "✔" : "☐"}</button><button style='background:#ef4444;color:white;border:none;border-radius:6px;padding:4px 8px;cursor:pointer;' onclick='removeFromTable(${index})'>إزالة</button></span></div>`;
  }).join("");
  box.innerHTML = `<div class="text">جدول ${day}</div><div style='margin-top:8px;'>${items}</div>`;
  listEl.appendChild(box);
  const btn = document.getElementById("toggleTableBtn");
  if (btn) btn.textContent = "▼ إخفاء الجدول";
}

function toggleDayTasks(){
  const listEl = document.getElementById("dayTasks");
  const btn = document.getElementById("toggleTableBtn");
  if (listEl.classList.contains("hidden")) {
    showDayTasks();
    btn.textContent = "▼ إخفاء الجدول";
  } else {
    listEl.classList.add("hidden");
    btn.textContent = "▶ جدول اليوم";
  }
}

function hideDayTasks(){
  const listEl = document.getElementById("dayTasks");
  listEl.innerHTML = "";
  listEl.classList.add("hidden");
  const btn = document.getElementById("toggleTableBtn");
  if (btn) btn.textContent = "▶ جدول اليوم";
}

function renderTasks(){
  const container = document.getElementById("tasks");
  container.innerHTML = "";
  const now = new Date();
  const today = now.getDay(); // Sunday=0
  const arabicToday = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"][today];

  const visibleTasks = tasks.filter((task) => !task.inTable);
  if (!visibleTasks.length){
    container.innerHTML = `<div class='task'><div class='text'>لا توجد مهام ظاهرية (المهمة في الجدول الآن)</div></div>`;
    updateTaskPicker();
    return;
  }
  visibleTasks.forEach((task) => {
    const index = tasks.indexOf(task);
    const isLate = !task.done && task.day === arabicToday && now.toTimeString().slice(0,5) > task.time;
    const row = document.createElement("div");
    row.className = "task" + (task.done ? " done" : isLate ? " late" : "");
    row.innerHTML = `
      <div>
        <div class="text ${task.done ? "done" : ""}">${task.text} <small style="font-size:.78rem; color:#718096; margin-left:4px;">(${task.day || 'اليوم'} ${task.display})</small></div>
      </div>
      <div class="task-actions">
        <button onclick="markDone(${index})">${task.done ? "↩" : "✔"}</button>
        <button onclick="toggleInTable(${index})">${task.inTable ? "📌" : "⬜"}</button>
        <button class="delete-btn" onclick="deleteTask(${index})">🗑</button>
      </div>`;
    container.appendChild(row);
  });
  updateTaskPicker();
}

updateClock();
renderTasks();
updateTaskPicker();
setInterval(updateClock,1000);
</script>

</body>
</html>
