<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Planner Animated</title>

<style>
/* نفس CSS تبعك بدون تغيير */
:root {
 --bg: #1a1a1a;
 --panel: #2c2c2c;
 --card: #3a3a3a;
 --text: #f5f5dc;
 --muted: #c0c0c0;
 --primary: #facc15;
 --success: #22c55e;
 --danger: #ef4444;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
 min-height: 100vh;
 background: radial-gradient(circle at 10% 10%, #2c2c2c, #1a1a1a);
 font-family: "Cairo", sans-serif;
 color: var(--text);
 display: flex;
 justify-content: center;
 padding: 20px;
}

.page {
 width: min(760px, 100%);
 background: rgba(44,44,44,0.85);
 backdrop-filter: blur(16px);
 border-radius: 18px;
 overflow: hidden;
 box-shadow: 0 25px 60px rgba(0,0,0,0.6);
}

.top { padding:20px; text-align:center; }
.clock { color: var(--primary); }

.container { padding:20px; }

.input-row {
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:10px;
 margin-bottom:10px;
}

input, select {
 width:100%;
 padding:10px;
 border-radius:10px;
 background:#1a1a1a;
 border:1px solid #3a3a3a;
 color:var(--text);
}

button {
 background: var(--primary);
 border:none;
 padding:10px;
 border-radius:10px;
 cursor:pointer;
}

.tasks { margin-top:10px; display:grid; gap:10px; }

.task {
 background: var(--card);
 padding:10px;
 border-radius:10px;
 display:flex;
 justify-content:space-between;
}

.task.done { background:#1e3a1a; }
.task.late { background:#3a1a1a; }

.delete-btn { background:red; color:white; }
</style>
</head>

<body>

<div class="page">
<div class="top">
<h1>📚 Study Planner</h1>
<div id="clockText" class="clock"></div>
</div>

<div class="container">

<div class="input-row">
<input id="taskInput" placeholder="المهمة">

<div>
بداية:
<div style="display:flex; gap:5px;">
<input id="startHour" type="number" min="1" max="12" value="8">
<input id="startMin" type="number" min="0" max="59" value="0">
<select id="startAP">
<option>AM</option>
<option>PM</option>
</select>
</div>
</div>
</div>

<div class="input-row">
<div>
نهاية:
<div style="display:flex; gap:5px;">
<input id="endHour" type="number" min="1" max="12" value="9">
<input id="endMin" type="number" min="0" max="59" value="0">
<select id="endAP">
<option>AM</option>
<option>PM</option>
</select>
</div>
</div>

<button id="addBtn">+ إضافة</button>
</div>

<div id="tasks" class="tasks"></div>

</div>
</div>

<script>
const taskInput = document.getElementById("taskInput");
const tasksEl = document.getElementById("tasks");

let tasks = JSON.parse(localStorage.getItem("tasks") || "[]");

function convertTo24(h, m, ap){
 h = parseInt(h);
 m = parseInt(m);

 if(ap === "PM" && h !== 12) h += 12;
 if(ap === "AM" && h === 12) h = 0;

 return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
}

function save(){
 localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask(){
 const text = taskInput.value.trim();
 if(!text) return;

 const start = convertTo24(
 document.getElementById("startHour").value,
 document.getElementById("startMin").value,
 document.getElementById("startAP").value
 );

 const end = convertTo24(
 document.getElementById("endHour").value,
 document.getElementById("endMin").value,
 document.getElementById("endAP").value
 );

 tasks.push({ text, start, end, done:false });

 taskInput.value="";
 save();
 render();
}

function render(){
 tasksEl.innerHTML="";
 const now = new Date().toTimeString().slice(0,5);

 tasks.forEach((t,i)=>{
 const late = !t.done && t.end < now;

 const div = document.createElement("div");
 div.className = "task " + (t.done?"done": late?"late":"");

 div.innerHTML = `
 <div>${t.text} (${t.start} - ${t.end})</div>
 <div>
 <button onclick="toggle(${i})">${t.done?"↩":"✔"}</button>
 <button class="delete-btn" onclick="del(${i})">🗑</button>
 </div>
 `;

 tasksEl.appendChild(div);
 });
}

function toggle(i){
 tasks[i].done = !tasks[i].done;
 save();
 render();
}

function del(i){
 tasks.splice(i,1);
 save();
 render();
}

function updateClock(){
 document.getElementById("clockText").textContent =
 new Date().toLocaleTimeString();
 requestAnimationFrame(updateClock);
}

document.getElementById("addBtn").onclick = addTask;

render();
updateClock();
</script>

</body>
</html>
