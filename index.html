<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Planner Pro</title>

<style>
:root {
  --bg: #1a1a1a;
  --panel: #2c2c2c;
  --card: #3a3a3a;
  --text: #f5f5dc;
  --muted: #c0c0c0;
  --primary: #facc15;
  --success: #22c55e;
  --danger: #ef4444;
}

* { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

body {
  min-height: 100vh;
  background: radial-gradient(circle at 10% 10%, #2c2c2c, #1a1a1a);
  color: var(--text);
  display: flex;
  justify-content: center;
  padding: 20px;
}

@keyframes floatIn { 0% { opacity:0; transform: translateY(20px); } 100% { opacity:1; transform: translateY(0); } }

.page {
  width: min(850px, 100%);
  background: rgba(44,44,44,0.9);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  overflow: hidden;
  animation: floatIn 0.5s ease;
}

.top {
  background: linear-gradient(135deg, #333, #222);
  padding: 25px;
  text-align: center;
  border-bottom: 2px solid var(--primary);
}

.clock {
  font-size: 1.5rem;
  font-weight: bold;
  color: var(--primary);
  margin-top: 10px;
}

.container { padding: 25px; }

.input-section {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-bottom: 30px;
  background: rgba(0,0,0,0.2);
  padding: 20px;
  border-radius: 15px;
}

.row {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
}

.input-group { flex: 1; min-width: 200px; }

label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: var(--muted); }

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #444;
  background: #1a1a1a;
  color: white;
  outline: none;
}

input:focus { border-color: var(--primary); }

.add-btn {
  background: var(--primary);
  color: #000;
  border: none;
  padding: 12px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
  width: 100%;
  font-size: 1.1rem;
}

.add-btn:hover { transform: scale(1.02); filter: brightness(1.1); }

.tasks { display: grid; gap: 15px; }

.task-card {
  background: var(--card);
  padding: 15px;
  border-radius: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-right: 5px solid var(--primary);
  transition: 0.3s;
}

.task-card.done { border-right-color: var(--success); opacity: 0.7; }
.task-card.done .task-info { text-decoration: line-through; }

.task-info h3 { font-size: 1.1rem; margin-bottom: 5px; }
.task-time { font-size: 0.85rem; color: var(--primary); font-weight: bold; }

.actions { display: flex; gap: 10px; }

.btn-action {
  width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
}

.done-btn { background: var(--success); color: white; }
.del-btn { background: var(--danger); color: white; }

.footer { text-align: center; padding: 20px; color: var(--muted); font-size: 0.8rem; }

</style>
</head>
<body>

<div class="page">
  <div class="top">
    <h1>📝 منظّم الدراسة الذكي</h1>
    <div id="clockText" class="clock">00:00:00</div>
  </div>

  <div class="container">
    <div class="input-section">
      <div class="input-group">
        <label>اسم المادة / المهمة</label>
        <input type="text" id="taskInput" placeholder="مثلاً: مراجعة فيزياء">
      </div>

      <div class="row">
        <div class="input-group">
          <label>من (البداية)</label>
          <div style="display:flex; gap:5px;">
            <input type="number" id="startHour" placeholder="الساعة" min="1" max="12">
            <select id="startPeriod">
              <option value="AM">AM</option>
              <option value="PM">PM</option>
            </select>
          </div>
        </div>

        <div class="input-group">
          <label>إلى (النهاية)</label>
          <div style="display:flex; gap:5px;">
            <input type="number" id="endHour" placeholder="الساعة" min="1" max="12">
            <select id="endPeriod">
              <option value="AM">AM</option>
              <option value="PM">PM</option>
            </select>
          </div>
        </div>
      </div>

      <button class="add-btn" onclick="addTask()">+ إضافة للجدول</button>
    </div>

    <div id="tasksContainer" class="tasks">
      </div>
  </div>

  <div class="footer">Developer - GNR 🔥 | 2026</div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("study_tasks") || "[]");

function updateClock() {
  const now = new Date();
  document.getElementById('clockText').textContent = now.toLocaleTimeString('ar-EG');
  requestAnimationFrame(updateClock);
}

function addTask() {
  const text = document.getElementById("taskInput").value;
  const sHour = document.getElementById("startHour").value;
  const sPeriod = document.getElementById("startPeriod").value;
  const eHour = document.getElementById("endHour").value;
  const ePeriod = document.getElementById("endPeriod").value;

  if (!text || !sHour || !eHour) {
    alert("الرجاء تعبئة كافة الحقول!");
    return;
  }

  const newTask = {
    id: Date.now(),
    text,
    startTime: `${sHour} ${sPeriod}`,
    endTime: `${eHour} ${ePeriod}`,
    done: false
  };

  tasks.push(newTask);
  saveAndRender();
  
  // مسح الخانات بعد الإضافة
  document.getElementById("taskInput").value = "";
  document.getElementById("startHour").value = "";
  document.getElementById("endHour").value = "";
}

function toggleTask(id) {
  tasks = tasks.map(t => t.id === id ? {...t, done: !t.done} : t);
  saveAndRender();
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveAndRender();
}

function saveAndRender() {
  localStorage.setItem("study_tasks", JSON.stringify(tasks));
  render();
}

function render() {
  const container = document.getElementById("tasksContainer");
  container.innerHTML = "";

  tasks.forEach(t => {
    const div = document.createElement("div");
    div.className = `task-card ${t.done ? 'done' : ''}`;
    div.innerHTML = `
      <div class="task-info">
        <h3>${t.text}</h3>
        <span class="task-time">🕒 من ${t.startTime} إلى ${t.endTime}</span>
      </div>
      <div class="actions">
        <button class="btn-action done-btn" onclick="toggleTask(${t.id})">${t.done ? '↩' : '✓'}</button>
        <button class="btn-action del-btn" onclick="deleteTask(${t.id})">🗑</button>
      </div>
    `;
    container.appendChild(div);
  });
}

// البدء
updateClock();
render();
</script>

</body>
</html>
